name: Release

# Tag a version (e.g. `git tag v0.2.0 && git push origin v0.2.0`) to cut a GitHub
# release, attach prebuilt binaries for macOS + Linux (x86_64 and aarch64), and
# bump the Homebrew tap formula to install those binaries.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-release:
    name: GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Create release
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: github-release
    # Run even when github-release is skipped (branch push / dry-run) so the
    # cross-builds still get exercised in CI.
    if: always() && (needs.github-release.result == 'success' || needs.github-release.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      # taiki-e/upload-rust-binary-action is the de-facto standard for this: it
      # installs the target (using `cross` for aarch64-musl), builds --release,
      # tars the binary as `claude-replay-<target>.tar.gz`, emits a .sha256, and
      # uploads both to the release. `dry-run` builds+archives without uploading,
      # so branch pushes verify the cross-builds without needing a release.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: claude-replay
          target: ${{ matrix.target }}
          archive: $bin-$target
          checksum: sha256
          dry-run: ${{ !startsWith(github.ref, 'refs/tags/') }}
          token: ${{ secrets.GITHUB_TOKEN }}
      # agent-jdi ships from the same crate/release as a separate binary + formula
      # (the viewer stays a read-only formula; this one supervises unattended runs).
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: agent-jdi
          target: ${{ matrix.target }}
          archive: $bin-$target
          checksum: sha256
          dry-run: ${{ !startsWith(github.ref, 'refs/tags/') }}
          token: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    name: Bump Homebrew formula
    needs: [github-release, build-binaries]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    # A PAT that can push to tanghong123/homebrew-tap (fine-grained: Contents R/W on
    # that repo). Add it:  gh secret set HOMEBREW_TAP_TOKEN --repo tanghong123/claude-replay
    # Until it's set, this job skips cleanly instead of failing.
    env:
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      # Regenerate the formula as a per-platform binary formula: pull each release
      # tarball's sha256 and write url/sha256 blocks for macOS + Linux, arm + intel.
      # `brew install` then downloads the prebuilt binary (fast, no Rust toolchain)
      # on both Homebrew and Linuxbrew.
      - name: Bump tanghong123/homebrew-tap formula
        if: env.TAP_TOKEN != ''
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          ver="${tag#v}"
          base="https://github.com/tanghong123/claude-replay/releases/download/${tag}"

          sha() { curl -fsSL "${base}/$1-$2.tar.gz" | sha256sum | awk '{print $1}'; }
          mac_arm=$(sha claude-replay aarch64-apple-darwin)
          mac_x86=$(sha claude-replay x86_64-apple-darwin)
          lin_arm=$(sha claude-replay aarch64-unknown-linux-musl)
          lin_x86=$(sha claude-replay x86_64-unknown-linux-musl)
          jdi_mac_arm=$(sha agent-jdi aarch64-apple-darwin)
          jdi_mac_x86=$(sha agent-jdi x86_64-apple-darwin)
          jdi_lin_arm=$(sha agent-jdi aarch64-unknown-linux-musl)
          jdi_lin_x86=$(sha agent-jdi x86_64-unknown-linux-musl)

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/tanghong123/homebrew-tap.git" tap
          cat > tap/Formula/claude-replay.rb <<EOF
          class ClaudeReplay < Formula
            desc "Interactive, read-only viewer for Claude Code session transcripts"
            homepage "https://github.com/tanghong123/claude-replay"
            version "${ver}"
            license "MIT"
            head "https://github.com/tanghong123/claude-replay.git", branch: "main"

            on_macos do
              on_arm do
                url "${base}/claude-replay-aarch64-apple-darwin.tar.gz"
                sha256 "${mac_arm}"
              end
              on_intel do
                url "${base}/claude-replay-x86_64-apple-darwin.tar.gz"
                sha256 "${mac_x86}"
              end
            end

            on_linux do
              on_arm do
                url "${base}/claude-replay-aarch64-unknown-linux-musl.tar.gz"
                sha256 "${lin_arm}"
              end
              on_intel do
                url "${base}/claude-replay-x86_64-unknown-linux-musl.tar.gz"
                sha256 "${lin_x86}"
              end
            end

            def install
              bin.install "claude-replay"
            end

            test do
              assert_match "claude-replay #{version}", shell_output("#{bin}/claude-replay --version")
            end
          end
          EOF

          cat > tap/Formula/agent-jdi.rb <<EOF
          class AgentJdi < Formula
            desc "Supervise unattended AI-agent (Claude, Codex) runs and follow them live"
            homepage "https://github.com/tanghong123/claude-replay"
            version "${ver}"
            license "MIT"
            head "https://github.com/tanghong123/claude-replay.git", branch: "main"
            depends_on "tanghong123/tap/claude-replay"

            on_macos do
              on_arm do
                url "${base}/agent-jdi-aarch64-apple-darwin.tar.gz"
                sha256 "${jdi_mac_arm}"
              end
              on_intel do
                url "${base}/agent-jdi-x86_64-apple-darwin.tar.gz"
                sha256 "${jdi_mac_x86}"
              end
            end

            on_linux do
              on_arm do
                url "${base}/agent-jdi-aarch64-unknown-linux-musl.tar.gz"
                sha256 "${jdi_lin_arm}"
              end
              on_intel do
                url "${base}/agent-jdi-x86_64-unknown-linux-musl.tar.gz"
                sha256 "${jdi_lin_x86}"
              end
            end

            def install
              bin.install "agent-jdi"
            end

            test do
              assert_match "agent-jdi #{version}", shell_output("#{bin}/agent-jdi --version")
            end
          end
          EOF

          cd tap
          git config user.name "Hong Tang"
          git config user.email "hong.tang@gmail.com"
          if [ -z "$(git status --porcelain -- Formula/claude-replay.rb Formula/agent-jdi.rb)" ]; then
            echo "formulas already at ${ver}; nothing to do"
          else
            git add Formula/claude-replay.rb Formula/agent-jdi.rb
            git commit -m "claude-replay + agent-jdi ${ver}"
            git push
          fi
